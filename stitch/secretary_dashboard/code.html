<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Secretary Dashboard - GreenTax Verify</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800;900&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",

                extend: {
                    "colors": {
                        "on-background": "#191c1b",
                        "on-secondary-fixed-variant": "#304e2e",
                        "on-surface-variant": "#40493d",
                        "surface": "#f8faf8",
                        "surface-tint": "#1b6d24",
                        "primary-fixed-dim": "#88d982",
                        "error": "#ba1a1a",
                        "outline": "#707a6c",
                        "tertiary-container": "#b14b6f",
                        "inverse-surface": "#2e3130",
                        "tertiary": "#923357",
                        "secondary-fixed": "#c9ecc1",
                        "inverse-primary": "#88d982",
                        "error-container": "#ffdad6",
                        "primary": "#0d631b",
                        "primary-fixed": "#a3f69c",
                        "surface-bright": "#f8faf8",
                        "surface-container-low": "#f2f4f2",
                        "on-secondary-container": "#4c6a48",
                        "on-tertiary-container": "#ffedf0",
                        "outline-variant": "#bfcaba",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#c6e9be",
                        "surface-dim": "#d8dad9",
                        "on-tertiary-fixed-variant": "#7f2448",
                        "inverse-on-surface": "#eff1ef",
                        "on-error-container": "#93000a",
                        "background": "#f8faf8",
                        "primary-container": "#2e7d32",
                        "on-secondary-fixed": "#052106",
                        "surface-container-high": "#e6e9e7",
                        "secondary": "#476644",
                        "on-primary-fixed-variant": "#005312",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e1e3e1",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed": "#002204",
                        "tertiary-fixed": "#ffd9e2",
                        "on-surface": "#191c1b",
                        "on-tertiary-fixed": "#3f001c",
                        "surface-container": "#eceeec",
                        "on-error": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#cbffc2",
                        "surface-variant": "#e1e3e1",
                        "secondary-fixed-dim": "#add0a6",
                        "tertiary-fixed-dim": "#ffb1c7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Public Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            }
        }

<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Public Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .trust-score-gradient {
            background: conic-gradient(from 0deg, #0d631b 87%, #eceeec 87%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-emerald-800 dark:bg-emerald-950 bg-gradient-to-br from-emerald-900 to-emerald-700 shadow-none flex justify-between items-center px-4 h-16 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-white text-2xl" data-icon="account_balance">account_balance</span>
<h1 class="font-public-sans font-bold text-lg text-white tracking-tight">Secretary Dashboard</h1>
</div>
<div class="active:scale-95 transition-transform">
<img alt="user_profile_photo" class="w-10 h-10 rounded-full border-2 border-emerald-400/30" data-alt="professional headshot of a middle-aged administrative official in formal attire, clean studio lighting, soft green background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBiBCc3e194S9nbezfHhkrZFLuD2bvGlJMHuOsBRljtb1nzbr884puyCso5E_tOOsKu3YrlCDPFRi2fZ5NfsFhuo08-mN6W26SWpLjG8vsFqeC6yKnRAKBzzmXscYHgNCt9f6hccHbpHDCdJeUgGfykw2UehILTPZS6esamxgQl0sqgCbfLN0J9vwCRDojTqCP99mF22-oy75hSPOzbR51M2lgDX4ThaveCM4kzPsjyPclClE37XAE5QnvtkX-_gr14MWHG0vVGF7U"/>
</div>
</header>
<main class="pt-20 px-4 space-y-6">
<!-- Welcome Card & Trust Score -->
<section class="mt-4">
<div class="bg-surface-container-lowest rounded-[2rem] p-6 flex items-center justify-between gap-4 relative overflow-hidden">
<!-- Decorative element -->
<div class="absolute -top-12 -right-12 w-32 h-32 bg-primary/5 rounded-full blur-3xl"></div>
<div class="flex-1">
<p class="text-on-surface-variant font-label text-sm font-medium mb-1">Welcome back,</p>
<h2 class="text-primary font-headline text-2xl font-extrabold leading-tight">Green Valley Residency</h2>
<div class="mt-3 inline-flex items-center gap-2 bg-primary-fixed/30 px-3 py-1 rounded-full">
<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1;">verified</span>
<span class="text-on-primary-fixed-variant font-label text-xs font-bold">Government Verified</span>
</div>
</div>
<!-- Trust Score Circular Progress -->
<div class="relative flex items-center justify-center w-24 h-24">
<div class="absolute inset-0 rounded-full trust-score-gradient"></div>
<div class="absolute inset-2 bg-surface-container-lowest rounded-full flex flex-col items-center justify-center">
<span class="text-primary font-headline text-xl font-black">87</span>
<span class="text-on-surface-variant font-label text-[10px] font-semibold uppercase tracking-tighter">Trust</span>
</div>
</div>
</div>
</section>
<!-- Action Grid -->
<section class="grid grid-cols-2 gap-4">
<!-- Upload Proof -->
<button class="bg-surface-container-low hover:bg-surface-container-high transition-all p-6 rounded-[2rem] flex flex-col items-start gap-4 text-left group active:scale-95 duration-200">
<div class="w-12 h-12 rounded-2xl bg-primary-container flex items-center justify-center text-white shadow-sm group-hover:rotate-6 transition-transform">
<span class="material-symbols-outlined text-2xl" data-icon="photo_camera">photo_camera</span>
</div>
<div>
<h3 class="text-on-surface font-headline font-bold text-base leading-snug">Upload Proof</h3>
<p class="text-on-surface-variant font-body text-xs mt-1">Add new verification photos</p>
</div>
</button>
<!-- View History -->
<button class="bg-surface-container-low hover:bg-surface-container-high transition-all p-6 rounded-[2rem] flex flex-col items-start gap-4 text-left group active:scale-95 duration-200">
<div class="w-12 h-12 rounded-2xl bg-secondary-container flex items-center justify-center text-on-secondary-container shadow-sm group-hover:rotate-6 transition-transform">
<span class="material-symbols-outlined text-2xl" data-icon="list_alt">list_alt</span>
</div>
<div>
<h3 class="text-on-surface font-headline font-bold text-base leading-snug">View History</h3>
<p class="text-on-surface-variant font-body text-xs mt-1">Track all past submissions</p>
</div>
</button>
<!-- My Profile -->
<button class="bg-surface-container-low hover:bg-surface-container-high transition-all p-6 rounded-[2rem] flex flex-col items-start gap-4 text-left group active:scale-95 duration-200">
<div class="w-12 h-12 rounded-2xl bg-tertiary-fixed flex items-center justify-center text-on-tertiary-fixed-variant shadow-sm group-hover:rotate-6 transition-transform">
<span class="material-symbols-outlined text-2xl" data-icon="person">person</span>
</div>
<div>
<h3 class="text-on-surface font-headline font-bold text-base leading-snug">My Profile</h3>
<p class="text-on-surface-variant font-body text-xs mt-1">Manage society details</p>
</div>
</button>
<!-- Rebate Status -->
<button class="bg-surface-container-low hover:bg-surface-container-high transition-all p-6 rounded-[2rem] flex flex-col items-start gap-4 text-left group active:scale-95 duration-200">
<div class="w-12 h-12 rounded-2xl bg-primary-fixed flex items-center justify-center text-on-primary-fixed-variant shadow-sm group-hover:rotate-6 transition-transform">
<span class="material-symbols-outlined text-2xl" data-icon="payments">payments</span>
</div>
<div>
<h3 class="text-on-surface font-headline font-bold text-base leading-snug">Rebate Status</h3>
<p class="text-on-surface-variant font-body text-xs mt-1">View pending tax savings</p>
</div>
</button>
</section>
<!-- Stats Bento Section -->
<section class="space-y-4">
<div class="flex justify-between items-end">
<h3 class="text-primary font-headline font-bold text-lg">Environmental Impact</h3>
<span class="text-on-surface-variant font-label text-xs font-semibold">Updated Today</span>
</div>
<div class="grid grid-cols-1 gap-4">
<div class="bg-primary/5 rounded-[2rem] p-6 border border-primary/10 flex items-center gap-6">
<div class="w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="eco">eco</span>
</div>
<div>
<p class="text-on-surface-variant font-label text-xs uppercase tracking-widest font-bold">Waste Managed</p>
<h4 class="text-on-surface font-headline text-2xl font-black">1.2 Tons <span class="text-primary text-sm font-medium ml-1">↑ 12%</span></h4>
</div>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-4 pt-2 bg-white/80 dark:bg-emerald-950/80 backdrop-blur-xl rounded-t-3xl border-t border-emerald-100/20 shadow-[0_-4px_24px_0_rgba(25,28,27,0.06)]">
<!-- Dashboard (Active) -->
<a class="flex flex-col items-center justify-center bg-emerald-100 dark:bg-emerald-900/40 text-emerald-900 dark:text-emerald-50 rounded-2xl px-5 py-1.5 duration-200 active:scale-90" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="dashboard" style="font-variation-settings: 'FILL' 1;">dashboard</span>
<span class="font-inter text-[10px] font-semibold mt-1">Dashboard</span>
</a>
<!-- Activity -->
<a class="flex flex-col items-center justify-center text-emerald-600 dark:text-emerald-400 opacity-70 hover:bg-emerald-50 dark:hover:bg-emerald-900/20 rounded-xl px-4 py-1 duration-200 active:scale-90" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="history">history</span>
<span class="font-inter text-[10px] font-semibold mt-1">Activity</span>
</a>
<!-- Review -->
<a class="flex flex-col items-center justify-center text-emerald-600 dark:text-emerald-400 opacity-70 hover:bg-emerald-50 dark:hover:bg-emerald-900/20 rounded-xl px-4 py-1 duration-200 active:scale-90" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="fact_check">fact_check</span>
<span class="font-inter text-[10px] font-semibold mt-1">Review</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-emerald-600 dark:text-emerald-400 opacity-70 hover:bg-emerald-50 dark:hover:bg-emerald-900/20 rounded-xl px-4 py-1 duration-200 active:scale-90" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="person">person</span>
<span class="font-inter text-[10px] font-semibold mt-1">Profile</span>
</a>
</nav>
</body></html>
